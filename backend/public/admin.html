<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin Dashboard | Media Walkie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { overflow: auto; padding: 40px; }
        .admin-container { max-width: 1200px; margin: 0 auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--surface); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.1); color: var(--primary); font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-verified { background: #4caf50; color: white; }
        .badge-pending { background: var(--danger); color: white; }
        button { background: var(--primary); color: black; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        select { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; width: 100%; }
        .section-title { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="section-title">
            <h1>SUPERADMIN DASHBOARD</h1>
            <button onclick="window.location.href='/'">BACK TO RADIO</button>
        </div>

        <div id="login-section">
            <p>Please enter Superadmin PIN to access:</p>
            <input type="password" id="admin-pin" placeholder="Enter PIN" style="margin-top: 10px; padding: 10px; width: 200px;">
            <button onclick="checkAdmin()">ACCESS</button>
        </div>

        <div id="admin-content" style="display:none;">
            <h2 style="margin-top: 40px;">Active Channels</h2>
            <table>
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>FREQUENCY</th>
                        <th>RANGE</th>
                        <th>CREATED</th>
                    </tr>
                </thead>
                <tbody id="group-table">
                    <!-- Groups loaded here -->
                </tbody>
            </table>

            <h2 style="margin-top: 40px;">User Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>EMAIL / PHONE</th>
                        <th>PIN</th>
                        <th>STATUS</th>
                        <th>CHANNELS (RANGES)</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="user-table">
                    <!-- Users loaded here -->
                </tbody>
            </table>

            <h2 style="margin-top: 40px;">Create New Channel</h2>
            <div style="background: var(--surface); padding: 20px; border-radius: 12px; display: flex; gap: 10px;">
                <input type="text" id="group-name" placeholder="Channel Name" style="flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: white;">
                <input type="text" id="group-freq" placeholder="Freq (MHz)" style="flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: white;">
                <input type="text" id="group-pin" placeholder="PIN (Optional)" style="width: 120px; padding: 10px; background: #222; border: 1px solid #444; color: var(--gold);">
                <input type="text" id="group-range" placeholder="Range (e.g. 1km)" style="flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: white;">
                <button onclick="createGroup()">CREATE</button>
            </div>
        </div>
    </div>

    <script>
        let allGroups = [];
        let superAdminVerified = false;

        async function checkAdmin() {
            const pin = document.getElementById('admin-pin').value;
            if (pin === 'Vanyx1512') {
                superAdminVerified = true;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadData();
            } else {
                alert("Incorrect PIN");
            }
        }

        async function loadData() {
            try {
                // Fetch all groups first
                const gRes = await fetch('/api/admin/groups');
                allGroups = await gRes.json();
                renderGroups(allGroups);

                // Then fetch users
                const usersRes = await fetch('/api/admin/users');
                const users = await usersRes.json();
                renderUsers(users);
            } catch (err) {
                console.error("Load Data Error:", err);
            }
        }

        function renderGroups(groups) {
            const tbody = document.getElementById('group-table');
            tbody.innerHTML = '';
            groups.forEach(g => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--primary); font-weight: bold;">
                        <input type="text" id="edit-name-${g._id}" value="${g.name}" style="background:transparent; color: var(--primary); border:none; border-bottom: 1px solid #333; width: 100px;">
                    </td>
                    <td>
                        <input type="text" id="edit-freq-${g._id}" value="${g.frequency}" style="background:transparent; color: white; border:none; border-bottom: 1px solid #333; width: 80px;"> MHz
                    </td>
                    <td>
                        <input type="text" id="edit-range-${g._id}" value="${g.rangeDescription || ''}" style="background:transparent; color: #888; border:none; border-bottom: 1px solid #333; width: 120px;">
                    </td>
                    <td>
                        <input type="text" id="edit-pin-${g._id}" value="${g.pin || ''}" placeholder="PIN" style="background:transparent; color: var(--gold); border:none; border-bottom: 1px solid #333; width: 60px;">
                    </td>
                    <td>
                        <button onclick="updateGroup('${g._id}')">SAVE</button>
                        <button onclick="deleteGroup('${g._id}')" style="background: var(--danger); margin-left: 5px;">DEL</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateGroup(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const frequency = document.getElementById(`edit-freq-${id}`).value;
            const pin = document.getElementById(`edit-pin-${id}`).value;
            const rangeDescription = document.getElementById(`edit-range-${id}`).value;

            const res = await fetch(`/api/groups/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, frequency, pin, rangeDescription })
            });
            if (res.ok) {
                alert("Channel updated!");
                loadData();
            }
        }

        async function deleteGroup(id) {
            if (!confirm("Are you sure? This will remove the channel from all users.")) return;
            const res = await fetch(`/api/groups/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Channel deleted!");
                loadData();
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('user-table');
            tbody.innerHTML = '';

            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.name} ${user.isAdmin ? '(ADMIN)' : ''}</td>
                    <td>${user.email || 'N/A'}<br>${user.phone || 'N/A'}</td>
                    <td><input type="text" value="${user.pin}" onblur="updatePin('${user._id}', this.value)" style="width: 80px; background: transparent; color: white; border: 1px solid #444; padding: 4px;"></td>
                    <td><span class="badge ${user.isVerified ? 'badge-verified' : 'badge-pending'}">${user.isVerified ? 'VERIFIED' : 'PENDING'}</span></td>
                    <td>
                        <div style="max-height: 80px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;">
                            ${allGroups.map(g => `
                                <label style="display: block; margin-bottom: 4px; cursor: pointer; font-size: 11px;">
                                    <input type="checkbox" value="${g._id}" onchange="updateGroupsCheckbox('${user._id}')" id="checkbox-${user._id}-${g._id}"
                                    ${user.assignedGroups && user.assignedGroups.some(ag => (ag._id || ag) === g._id) ? 'checked' : ''}>
                                    ${g.name}
                                </label>
                            `).join('')}
                        </div>
                    </td>
                    <td>
                        <button onclick="toggleVerify('${user._id}', ${!user.isVerified})">${user.isVerified ? 'UNVERIFY' : 'VERIFY'}</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updatePin(userId, pin) {
            await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, pin })
            });
            console.log("PIN updated for", userId);
        }

        async function toggleVerify(userId, status) {
            await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, isVerified: status })
            });
            loadData();
        }

        async function updateGroupsCheckbox(userId) {
            // Find all checkboxes for this user
            const checkboxes = document.querySelectorAll(`input[id^="checkbox-${userId}-"]`);
            const selected = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selected.push(cb.value);
            });
            
            try {
                const res = await fetch('/api/admin/update-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, assignedGroups: selected })
                });
                
                if (res.ok) {
                    // Optional: Visual feedback (e.g. green flash)
                    console.log("Channels updated for", userId);
                } else {
                    alert("Failed to save channels");
                }
            } catch(e) {
                alert("Network error while saving");
            }
        }

        async function createGroup() {
            const name = document.getElementById('group-name').value;
            const frequency = document.getElementById('group-freq').value;
            const pin = document.getElementById('group-pin').value;
            const rangeDescription = document.getElementById('group-range').value;
            
            try {
                const response = await fetch('/api/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, frequency, pin, rangeDescription })
                });
                
                const result = await response.json();
                if (response.ok) {
                    alert("Channel created successfully!");
                    document.getElementById('group-name').value = '';
                    document.getElementById('group-freq').value = '';
                    document.getElementById('group-range').value = '';
                    loadData();
                } else {
                    alert("Error: " + (result.error || "Unknown error"));
                }
            } catch (err) {
                alert("Network error: " + err.message);
            }
        }
    </script>
</body>
</html>
